server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        # First try to serve file, then fallback to index.html
        try_files $uri /index.html;
    }

    # Optional: serve static assets with caching
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public";
    }
}
